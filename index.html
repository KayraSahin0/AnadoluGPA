<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anadolu Üniversitesi GPA Hesaplama</title>
    <link rel="icon" type="image/png" href="images/logoSiyah.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>Anadolu Üniversitesi</h1>
            <p>GPA Hesaplama Aracı</p>
        </div>
    </header>

    <div class="hero-selection">
        <div class="selection-card">
            <h2>Hoş Geldiniz</h2>
            <p>Derslerinizi görüntülemek için fakülte ve bölüm seçiniz.</p>
            
            <div class="select-group">
                <label>Fakülte</label>
                <select id="facultySelect">
                    <option value="">Seçim Yapınız...</option>
                </select>
            </div>

            <div class="select-group">
                <label>Bölüm</label>
                <select id="departmentSelect" disabled>
                    <option value="">Önce Fakülte Seçiniz</option>
                </select>
            </div>
        </div>
    </div>

    <div id="loadingIndicator" style="text-align:center; padding:20px; font-weight:bold; color:#002d58; display:none;">
        Dersler Yükleniyor...
    </div>

    <div class="main-container" id="semestersContainer">
        </div>

    <footer class="bottom-bar">
        <div>
            <span>Hesaplanan Kredi: <strong id="totalCredits">0</strong></span>
        </div>
        <div class="result-box">
            GENEL ORTALAMA (GPA): <span class="gpa-value" id="gpaResult">0.00</span>
        </div>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
